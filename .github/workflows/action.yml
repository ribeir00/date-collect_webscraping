name: Executar Webscraping do Metrópoles

# 2. Gatilhos de Execução (Quando roda)
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  rodar-script:
    runs-on: ubuntu-latest

    steps:

      - name: Baixar código fonte
        uses: actions/checkout@v4

    
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 python-dotenv supabase

      - name: Executar coletad.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: python website_metropoles_action_bi/coletad.py